<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlexGroup | Auto & Bau</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <!-- CSS Modules -->
    <link rel="stylesheet" href="styles/global.css">
    <link rel="stylesheet" href="styles/auto.css">
    <link rel="stylesheet" href="styles/bau.css">
    <style>
        /* Specific Split Screen Layout Styles */
        body {
            margin: 0;
            overflow: hidden; /* Prevent scrolling on the landing page *//
        }
        
        .split-container {
            display: flex;
            width: 100vw;
            height: 100vh;
        }
        
        .split-side {
            flex: 1;
            transition: var(--transition-smooth);
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Hover Expansion Logic */
        .split-side:hover {
            flex: 1.5;
        }
        
        /* Ensure content fades slightly when not focused */
        .split-container:hover .split-side:not(:hover) .content-wrapper {
            opacity: 0.5;
        }
        
        .content-wrapper {
            transition: opacity 0.4s ease;
        }
        
        /* Mobile Layout */
        @media (max-width: 768px) {
            .split-container {
                flex-direction: column;
            }
            .split-side:hover {
                flex: 1.2;
            }
        }
    </style>
</head>
<body>

    <!-- Global Header -->
    <header class="global-header" id="mainHeader">
        <div class="logo">
            <a href="index.html">ALEX<span>GROUP</span></a>
        </div>
        
        <div class="header-controls">
            <!-- Integrated Switcher - Just visual on split screen, functional on child pages -->
            <div class="theme-switcher" id="themeSwitcher" title="Switch Theme">
                <div class="slider"></div>
                <span class="switch-auto">Auto</span>
                <span class="switch-bau">Bau</span>
            </div>
            
            <!-- Language Selector Placeholder -->
            <div class="lang-selector">
                <span id="currentLang">🇩🇪 DE</span>
            </div>
        </div>
    </header>

    <!-- Split Screen Main Content -->
    <main class="split-container">
        
        <!-- Left Side: AUTO -->
        <section class="split-side split-auto" id="autoSide" onclick="location.href='auto/index.html';">
            <div class="content-wrapper">
                <h1 data-i18n="auto-title">KFZ Service</h1>
                <p data-i18n="auto-desc">Professionelle Diagnose, Reparatur und Kaufberatung für Ihr Auto.</p>
                <a href="auto/index.html" class="btn-auto" data-i18n="auto-btn">Zu Auto</a>
            </div>
        </section>
        
        <!-- Right Side: BAU -->
        <section class="split-side split-bau" id="bauSide" onclick="location.href='bau/index.html';">
            <div class="content-wrapper">
                <h1 data-i18n="bau-title">Innenausbau</h1>
                <p data-i18n="bau-desc">Exklusive Fliesen, Renovierung und professionelle Umzugshilfe.</p>
                <a href="bau/index.html" class="btn-bau" data-i18n="bau-btn">Zu Bau</a>
            </div>
        </section>

    </main>

    <script src="js/main.js"></script>
</body>
</html>
